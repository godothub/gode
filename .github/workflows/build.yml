name: Build

on:
  pull_request:
  workflow_dispatch:
    inputs:
      package_version:
        description: Package version used for the generated zip name
        required: false
        default: ""
  workflow_call:
    inputs:
      package_version:
        description: Package version used for the generated zip name
        required: false
        type: string

permissions:
  contents: read

env:
  LIBNODE_URL: https://github.com/moluopro/libnode/releases/download/24.15.0/libnode.zip
  PYTHON_VERSION: "3.14"

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            runner: windows-2022
            script: ./shell/build-windows.ps1 -Architecture x64 -Fresh
            artifact_path: example/addons/gode/binary/windows/x64/libgode.dll
          - platform: linux
            arch: x64
            runner: ubuntu-22.04
            script: ./shell/build-linux.sh --arch x64 --fresh
            artifact_path: example/addons/gode/binary/linux/x64/libgode.so
          - platform: macos
            arch: arm64
            runner: macos-26
            script: ./shell/build-macos.sh --arch arm64 --deployment-target 10.15 --fresh
            artifact_path: example/addons/gode/binary/macos/arm64/libgode.dylib
          - platform: ios
            arch: arm64
            runner: macos-26
            script: ./shell/build-ios.sh --arch arm64 --fresh
            artifact_path: example/addons/gode/binary/ios/arm64/libgode.dylib
          - platform: android
            arch: arm64
            runner: macos-26
            script: ./shell/build-android.sh --arch arm64 --fresh
            artifact_path: example/addons/gode/binary/android/arm64/libgode.so

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install generator dependencies
        run: python -m pip install -r generator/requirements.txt

      - name: Prepare libnode
        shell: bash
        run: >
          ./.github/shell/prepare-libnode.sh
          --url "${{ env.LIBNODE_URL }}"

      - name: Build Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: ${{ matrix.script }}

      - name: Build Unix
        if: matrix.platform != 'windows'
        shell: bash
        run: ${{ matrix.script }}

      - name: Upload platform binary
        uses: actions/upload-artifact@v4
        with:
          name: gode-binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  package:
    name: Package plugin
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install generator dependencies
        run: python -m pip install -r generator/requirements.txt

      - name: Generate addon types
        run: python generator/generator.py

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: gode-binary-windows-x64
          path: example/addons/gode/binary/windows/x64

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: gode-binary-linux-x64
          path: example/addons/gode/binary/linux/x64

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: gode-binary-macos-arm64
          path: example/addons/gode/binary/macos/arm64

      - name: Download iOS binary
        uses: actions/download-artifact@v4
        with:
          name: gode-binary-ios-arm64
          path: example/addons/gode/binary/ios/arm64

      - name: Download Android binary
        uses: actions/download-artifact@v4
        with:
          name: gode-binary-android-arm64
          path: example/addons/gode/binary/android/arm64

      - name: Package plugin
        id: package
        shell: bash
        run: |
          version="${{ inputs.package_version }}"
          if [ -z "$version" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              version="pr-${{ github.event.pull_request.number }}"
            else
              version="build-${{ github.run_number }}"
            fi
          fi
          ./.github/shell/package-plugin.sh --version "$version"
          echo "archive=dist/gode-plugin-$version.zip" >> "$GITHUB_OUTPUT"

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: gode-plugin
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
