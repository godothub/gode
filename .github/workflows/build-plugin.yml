name: Build Plugin

on:
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        default: v1.4.1
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  LIBNODE_VERSION: 24.15.0
  LIBNODE_URL: https://github.com/moluopro/libnode/releases/download/24.15.0/libnode.zip

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            script: shell/build-windows.ps1
            artifact_path: example/addons/gode/binary/windows/x64/libgode.dll
          - platform: android
            arch: arm64
            script: shell/build-android.ps1
            artifact_path: example/addons/gode/binary/android/arm64/libgode.so

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        shell: pwsh
        run: python -m pip install -r generator/requirements.txt

      - name: Cache libnode
        uses: actions/cache@v4
        with:
          path: build/deps/libnode-${{ env.LIBNODE_VERSION }}.zip
          key: libnode-${{ env.LIBNODE_VERSION }}

      - name: Cache Android NDK
        if: matrix.platform == 'android'
        uses: actions/cache@v4
        with:
          path: |
            build/android-ndk-r28b
            build/android-ndk-r28b-windows.zip
          key: android-ndk-r28b-windows

      - name: Prepare libnode
        shell: pwsh
        run: >
          ./shell/prepare-libnode.ps1
          -Version "${{ env.LIBNODE_VERSION }}"
          -Url "${{ env.LIBNODE_URL }}"

      - name: Build
        shell: pwsh
        run: >
          ./${{ matrix.script }}
          -Architecture ${{ matrix.arch }}
          -Fresh

      - name: Upload platform binary
        uses: actions/upload-artifact@v4
        with:
          name: gode-binary-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  package:
    name: Package plugin
    runs-on: windows-2022
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install generator dependencies
        shell: pwsh
        run: python -m pip install -r generator/requirements.txt

      - name: Generate addon types
        shell: pwsh
        run: python generator/generator.py

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: gode-binary-windows-x64
          path: example/addons/gode/binary/windows/x64

      - name: Download Android binary
        uses: actions/download-artifact@v4
        with:
          name: gode-binary-android-arm64
          path: example/addons/gode/binary/android/arm64

      - name: Package plugin
        id: package
        shell: pwsh
        run: |
          $version = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "pr-${{ github.event.pull_request.number }}" }
          ./shell/package-plugin.ps1 -Version $version
          "archive=dist/gode-plugin-$version.zip" >> $env:GITHUB_OUTPUT

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: gode-plugin
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease == 'true' }}
          files: ${{ steps.package.outputs.archive }}
